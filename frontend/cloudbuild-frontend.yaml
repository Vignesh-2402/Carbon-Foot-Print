substitutions:
  _API_URL: ""
  _GOOGLE_CLIENT_ID: ""
  _AUTH_ENABLED: "false"
  _FIREBASE_API_KEY: ""
  _FIREBASE_AUTH_DOMAIN: ""
  _FIREBASE_STORAGE_BUCKET: ""
  _FIREBASE_MESSAGING_SENDER_ID: ""
  _FIREBASE_APP_ID: ""

steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--build-arg"
      - "VITE_API_URL=${_API_URL}"
      - "--build-arg"
      - "VITE_GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID}"
      - "--build-arg"
      - "VITE_AUTH_ENABLED=${_AUTH_ENABLED}"
      - "--build-arg"
      - "VITE_FIREBASE_API_KEY=${_FIREBASE_API_KEY}"
      - "--build-arg"
      - "VITE_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN}"
      - "--build-arg"
      - "VITE_FIREBASE_PROJECT_ID=$PROJECT_ID"
      - "--build-arg"
      - "VITE_FIREBASE_STORAGE_BUCKET=${_FIREBASE_STORAGE_BUCKET}"
      - "--build-arg"
      - "VITE_FIREBASE_MESSAGING_SENDER_ID=${_FIREBASE_MESSAGING_SENDER_ID}"
      - "--build-arg"
      - "VITE_FIREBASE_APP_ID=${_FIREBASE_APP_ID}"
      - "-t"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/carbon-footprint/carbon-footprint-ui:latest"
      - "."
images:
  - "us-central1-docker.pkg.dev/$PROJECT_ID/carbon-footprint/carbon-footprint-ui:latest"
